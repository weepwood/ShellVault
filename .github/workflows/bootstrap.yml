name: Bootstrap ShellVault

on:
  push:
    paths:
      - ".bootstrap/**"
  pull_request:
    paths:
      - ".bootstrap/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}

      - name: Reconstruct verified project archive
        shell: bash
        run: |
          if [ ! -d .bootstrap ]; then
            echo "Project already bootstrapped."
            exit 0
          fi

          python3 - <<'PY'
          import base64
          import glob
          import hashlib
          from pathlib import Path

          expected = "74681c34e5111fddd532b22de8ce6a2f072c5b31834f03b35c7d1842743f3310"
          parts = sorted(glob.glob(".bootstrap/part-*"))
          encoded = "".join(Path(path).read_text(encoding="utf-8") for path in parts)
          encoded = "".join(encoded.split())
          archive = base64.b64decode(encoded, validate=True)
          actual = hashlib.sha256(archive).hexdigest()
          print(f"parts={len(parts)} base64_bytes={len(encoded)} archive_bytes={len(archive)}")
          print(f"sha256={actual}")
          if actual != expected:
              raise SystemExit(f"SHA-256 mismatch: expected {expected}, got {actual}")
          Path("/tmp/shellvault.tar.gz").write_bytes(archive)
          PY

          gzip --test /tmp/shellvault.tar.gz
          tar -xzf /tmp/shellvault.tar.gz -C .
          rm -rf .bootstrap .gitkeep

      - name: Publish source files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "feat: publish ShellVault Linux learning site"
            git push
          fi
