<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#111827" />
  <title>ShellVault · Linux 命令与部署学习手册</title>
  <style>
    :root{color-scheme:light dark;font-family:Inter,system-ui,-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0c0f12;color:#edf0f2}.loading{width:min(520px,calc(100% - 40px));padding:28px;border:1px solid #2b333b;border-radius:18px;background:#13171b;box-shadow:0 24px 80px #0006}.brand{display:flex;align-items:center;gap:12px;font-size:22px;font-weight:800}.mark{display:grid;place-items:center;width:44px;height:44px;border-radius:12px;background:#080b0e;color:#74c69d;font-family:monospace}.loading p{color:#a7afb8}.bar{height:7px;margin-top:22px;overflow:hidden;border-radius:999px;background:#252b31}.bar i{display:block;width:38%;height:100%;border-radius:inherit;background:#74c69d;animation:move 1.15s ease-in-out infinite alternate}.error{color:#ff9b96;white-space:pre-wrap;font:13px/1.6 monospace}@keyframes move{to{transform:translateX(165%)}}
  </style>
</head>
<body>
  <main class="loading">
    <div class="brand"><span class="mark">$_</span><span>ShellVault</span></div>
    <p id="status">正在载入 Linux 学习手册与命令库……</p>
    <div class="bar" id="bar"><i></i></div>
    <div class="error" id="error"></div>
  </main>
  <script>
    (() => {
      const base = 'https://raw.githubusercontent.com/weepwood/ShellVault/main/.bootstrap/';
      const parts = ['part-00','part-01','part-02','part-03','part-04'];
      const status = document.querySelector('#status');
      const error = document.querySelector('#error');
      const decoder = new TextDecoder();

      function decodeBase64(text) {
        const binary = atob(text.replace(/\s/g, ''));
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i += 1) bytes[i] = binary.charCodeAt(i);
        return bytes;
      }

      async function gunzip(bytes) {
        if (!('DecompressionStream' in window)) throw new Error('当前浏览器不支持 DecompressionStream，请升级到最新版 Chrome、Edge 或 Firefox。');
        const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
        return new Uint8Array(await new Response(stream).arrayBuffer());
      }

      function parseTar(bytes) {
        const files = {};
        let offset = 0;
        while (offset + 512 <= bytes.length) {
          const header = bytes.slice(offset, offset + 512);
          const name = decoder.decode(header.slice(0, 100)).replace(/\0.*$/, '');
          if (!name) break;
          const sizeText = decoder.decode(header.slice(124, 136)).replace(/\0.*$/, '').trim();
          const size = Number.parseInt(sizeText || '0', 8);
          offset += 512;
          if (size > 0) files[name.replace(/^\.\//, '')] = decoder.decode(bytes.slice(offset, offset + size));
          offset += Math.ceil(size / 512) * 512;
        }
        return files;
      }

      function inlineSite(files) {
        let html = files['index.html'];
        if (!html || !files['styles.css'] || !files['commands.js'] || !files['app.js']) throw new Error('项目归档缺少必要文件。');
        const closeScript = '<' + '/script>';
        html = html
          .replace('<link rel="icon" href="./favicon.svg" type="image/svg+xml" />', '')
          .replace('<link rel="manifest" href="./manifest.webmanifest" />', '')
          .replace('<link rel="stylesheet" href="./styles.css" />', `<style>${files['styles.css']}</style>`)
          .replace('<script src="./commands.js">' + closeScript, '<script>' + files['commands.js'] + closeScript)
          .replace('<script src="./app.js">' + closeScript, '<script>' + files['app.js'] + closeScript);
        document.open();
        document.write(html);
        document.close();
      }

      Promise.all(parts.map(async (part, index) => {
        status.textContent = `正在载入知识库 ${index + 1} / ${parts.length}……`;
        const response = await fetch(base + part, { cache: 'no-cache' });
        if (!response.ok) throw new Error(`无法读取 ${part}：HTTP ${response.status}`);
        return response.text();
      }))
        .then(chunks => decodeBase64(chunks.join('')))
        .then(gunzip)
        .then(parseTar)
        .then(inlineSite)
        .catch(reason => {
          document.querySelector('#bar').hidden = true;
          status.textContent = '载入失败';
          error.textContent = `${reason.message}\n\n可前往 GitHub 仓库查看项目与重新加载页面。`;
        });
    })();
  </script>
</body>
</html>
